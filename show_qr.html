<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>QR Codes</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding: 50px; }
        .qr-container { display: flex; justify-content: center; gap: 50px; margin-top: 30px; }
        .qr-item { background: white; color: black; padding: 20px; border-radius: 10px; }
        img { width: 200px; height: 200px; }
    </style>
</head>
<body>
    <h1>Pindai QR Code Ini (Sudah Diperbarui!)</h1>
    <p>URL: https://gentleman-butler-prayers-recreational.trycloudflare.com</p>
    
    <div class="qr-container">
        <div class="qr-item">
            <h3>Varian 0 (Rumah)</h3>
            <img src="qr_codes/qr_varian_0.png" alt="QR 0">
        </div>
        <div class="qr-item">
            <h3>Varian 1</h3>
            <img src="qr_codes/qr_varian_1.png" alt="QR 1">
        </div>
        <div class="qr-item">
            <h3>Varian 2</h3>
            <img src="qr_codes/qr_varian_2.png" alt="QR 2">
        </div>
        <div class="qr-item">
            <h3>Varian 3 (Vianney 2)</h3>
            <img src="qr_codes/qr_varian_3.png" alt="QR 3">
        </div>
    </div>
</body>
</html>
